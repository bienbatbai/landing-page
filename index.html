<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chuyển hướng YouTube</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
            box-sizing: border-box;
        }
        h2 { color: #ff0000; margin-top: 0; font-size: 22px; }
        input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 14px;
        }
        button {
            background-color: #ff0000;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
        }
        button:hover { background-color: #cc0000; }
        .result-box {
            margin-top: 20px;
            padding: 12px;
            background: #f1f8ff;
            border: 1px dashed #0066cc;
            border-radius: 6px;
            word-break: break-all;
            font-size: 13px;
            display: none;
        }
    </style>
</head>
<body>

<div class="container" id="admin-panel" style="display: none;">
    <h2>Hệ thống Tạo Link PropellerAds</h2>
    <p style="font-size: 14px; color: #555;">Dán link YouTube vào đây để lấy link cấu hình quảng cáo mà không lo bị tự động chuyển hướng:</p>
    <input type="text" id="yt-input" placeholder="Ví dụ: https://youtu.be/dQw4w9WgXcQ">
    <button onclick="generateLink()">Tạo Link Chạy Quảng Cáo</button>
    <div id="result" class="result-box"></div>
</div>

<div id="loading-view" style="display: none; text-align: center; font-size: 16px; color: #666;">
    Đang mở ứng dụng YouTube...
</div>

<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const rawYoutubeUrl = params.get("url"); 

        // Hàm bóc tách ID video từ link YouTube
        function getYoutubeId(url) {
            if (!url) return null;
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        // BẮT ĐẦU KIỂM TRA ĐIỀU KIỆN
        if (rawYoutubeUrl) {
            // NẾU CÓ THAM SỐ ?url= -> ĐÂY LÀ TRAFFIC TỪ QUẢNG CÁO -> CHUYỂN HƯỚNG NGAY
            document.getElementById("loading-view").style.display = "block";
            const videoId = getYoutubeId(rawYoutubeUrl);

            if (videoId) {
                const encodedId = encodeURIComponent(videoId);
                const androidIntent = "intent://www.youtube.com/watch?v=" + encodedId + "#Intent;scheme=https;package=com.google.android.youtube;end";
                const webUrl = "https://www.youtube.com/watch?v=" + encodedId;

                if (/Android/i.test(navigator.userAgent)) {
                    window.location.href = androidIntent;
                    setTimeout(function() {
                        window.location.replace(webUrl);
                    }, 1000);
                } else {
                    window.location.replace(webUrl);
                }
            } else {
                window.location.replace("https://www.youtube.com");
            }
        } else {
            // NẾU KHÔNG CÓ THAM SỐ ?url= -> BẠN ĐANG VÀO ĐỂ SỬA/XEM THỬ -> DỪNG LẠI HIỆN GIAO DIỆN
            document.getElementById("admin-panel").style.display = "block";
        }
    })();

    // Hàm tạo link nhanh cho bạn copy
    function generateLink() {
        const inputVal = document.getElementById("yt-input").value.trim();
        const resultBox = document.getElementById("result");
        if(!inputVal) {
            alert("Vui lòng nhập link YouTube!");
            return;
        }
        const currentLandingUrl = window.location.origin + window.location.pathname;
        const finalLink = currentLandingUrl + "?url=" + encodeURIComponent(inputVal);
        
        resultBox.style.display = "block";
        resultBox.innerHTML = "<strong>Link dán vào PropellerAds của bạn:</strong><br><br><span style='color:#0066cc; font-weight:bold;'>" + finalLink + "</span>";
    }
</script>
</body>
</html>
