```html
<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="utf-8">
  <title>Xem Video Trên Ứng Dụng YouTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    html, body {
      width: 100%;
      height: 100%;
      margin: 0;
      padding: 0;
      background: #0f0f0f;
      color: #fff;
      font-family: 'Roboto', Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      cursor: pointer;
    }

    .container {
      text-align: center;
      padding: 20px;
    }

    .play-btn {
      width: 90px;
      height: 65px;
      background-color: #ff0000;
      border-radius: 15px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4);
      border: none;
      outline: none;
      pointer-events: none;
    }

    .play-icon {
      width: 0;
      height: 0;
      border-top: 14px solid transparent;
      border-left: 24px solid #fff;
      border-bottom: 14px solid transparent;
      margin-left: 6px;
    }

    .text-guide {
      margin-top: 20px;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: #aaaaaa;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { opacity: 0.6; }
      50% { opacity: 1; }
      100% { opacity: 0.6; }
    }
  </style>
</head>

<body>

  <div class="container" id="main-content">
    <button class="play-btn" aria-label="Xem video">
      <div class="play-icon"></div>
    </button>

    <div class="text-guide">
      Chạm bất kỳ đâu để mở video trên YouTube...
    </div>
  </div>

<script>
  const p = new URLSearchParams(window.location.search);
  const videoId = p.get("v");
  const zone = p.get("zone_id") || "unknown";

  if (!videoId) {
    document.getElementById("main-content").innerHTML =
      "<div style='color:#ff4d4d;font-weight:bold;'>KHÔNG TÌM THẤY ID VIDEO</div>";
  }

  // Gửi thống kê
  const img = new Image();
  img.src =
    "https://script.google.com/macros/s/AKfycbyqxDBaE_j3nyh58F3dCwupBPUBMwWZfE4pOEV_lSTtZk3Es2qggnrDBA5NG8YqPaBr/exec" +
    "?zone=" + encodeURIComponent(zone) +
    "&ua=" + encodeURIComponent(navigator.userAgent);

  let opened = false;

  function openYoutube() {
    if (opened || !videoId) return;

    opened = true;

    const deepLink =
      "youtube://www.youtube.com/watch?v=" +
      encodeURIComponent(videoId);

    const fallback =
      "https://www.youtube.com/watch?v=" +
      encodeURIComponent(videoId);

    const startTime = Date.now();

    window.location.href = deepLink;

    setTimeout(function () {
      if (Date.now() - startTime < 1200) {
        window.location.href = fallback;
      }
    }, 1000);
  }

  document.addEventListener("click", openYoutube, { once: true });
  document.addEventListener("touchstart", openYoutube, { once: true });
</script>

</body>
</html>
