<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
</head>
<body>
<script>
    (function() {
        const params = new URLSearchParams(window.location.search);
        const videoId = params.get("v") || "dQw4w9WgXcQ"; // Thay ID mặc định nếu cần
        const encodedId = encodeURIComponent(videoId);
        
        const androidIntent = "intent://www.youtube.com/watch?v=" + encodedId + "#Intent;scheme=https;package=com.google.android.youtube;end";
        const webUrl = "https://www.youtube.com/watch?v=" + encodedId;

        // Ưu tiên cao nhất: Thử mở App ngay lập tức
        if (/Android/i.test(navigator.userAgent)) {
            window.location.href = androidIntent;
            
            // Backup siêu nhanh: Nếu sau 1 giây không vào được app, đẩy về web
            setTimeout(function() {
                window.location.replace(webUrl);
            }, 1000);
        } else {
            // Thiết bị không phải Android (iOS, PC)
            window.location.replace(webUrl);
        }
    })();
</script>
</body>
</html>
